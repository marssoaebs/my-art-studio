<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Red circle background -->
  <circle cx="200" cy="200" r="195" fill="#CC0000"/>

  <!-- Black outer ring -->
  <circle cx="200" cy="200" r="188" fill="none" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Black inner ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- LP text in black -->
  <text x="200" y="225" font-family="Georgia, serif" font-weight="700" fill="#1a1a1a" font-size="130" letter-spacing="-8" text-anchor="middle">LP</text>

  <!-- Black underline brush -->
  <rect x="75" y="242" width="250" height="3.5" rx="2" fill="#1a1a1a"/>
  <rect x="115" y="249" width="170" height="1.5" rx="1" fill="#1a1a1a" opacity="0.5"/>

  <!-- STUDIO in black -->
  <text x="200" y="288" font-family="Arial, sans-serif" fill="#1a1a1a" font-size="22" letter-spacing="10" text-anchor="middle">STUDIO</text>

  <!-- Tagline -->
  <text x="200" y="316" font-family="Arial, sans-serif" fill="rgba(0,0,0,0.45)" font-size="11" letter-spacing="4" text-anchor="middle">ART · CREATIVITY · CHILDREN</text>

  <!-- Decorative dots -->
  <circle cx="106" cy="288" r="2.5" fill="#1a1a1a"/>
  <circle cx="294" cy="288" r="2.5" fill="#1a1a1a"/>

  <!-- Paint dots bottom -->
  <circle cx="186" cy="350" r="3" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="200" cy="354" r="4.5" fill="#1a1a1a" opacity="0.7"/>
  <circle cx="214" cy="350" r="3" fill="#1a1a1a" opacity="0.4"/>

</svg>